<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>SciCo-Search — Authors</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;600;700&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20,400,0,0&display=block" rel="stylesheet">
<style>
  :root{--red:#BA5757;--btn:#68829e;--btn-strong:#586f87;--ink:#262730;--muted:#6B7280;--line:#E6E6E6;--slate:#8497B0;}
  *{box-sizing:border-box}html,body{margin:0}
  body{font-family:"Source Sans 3","Source Sans Pro",-apple-system,Segoe UI,Roboto,sans-serif;color:var(--ink);background:#fff;line-height:1.55;-webkit-font-smoothing:antialiased}
  .page{max-width:780px;margin:0 auto;padding:26px 24px 80px}
  .mi{font-family:'Material Symbols Outlined';font-weight:normal;font-size:1.1em;line-height:1;white-space:nowrap;
      -webkit-font-feature-settings:'liga';font-feature-settings:'liga';-webkit-font-smoothing:antialiased;vertical-align:-.16em;display:inline-block}
  .logo{display:inline-flex;align-items:flex-start;font-weight:700;line-height:1}
  .logo .sci{font-size:1.5em}.logo .badge{font-size:1em;color:#fff;background:var(--red);border-radius:4px;padding:.05em .3em;margin-left:.12em}
  .logo .sup{font-size:.6em;color:var(--slate);margin-left:.18em;margin-top:-.05em;font-style:italic}
  .top{display:flex;align-items:center;justify-content:space-between}
  .newbtn{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);background:#fff;border-radius:8px;padding:8px 13px;font-size:.88rem;cursor:pointer;color:var(--ink)}
  .newbtn:hover{border-color:var(--btn);color:var(--btn)}

  .tabs{display:flex;gap:22px;border-bottom:1px solid var(--line);margin:18px 0 0}
  .tab{display:flex;align-items:center;gap:7px;padding:10px 0;font-size:.96rem;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px}
  .tab .mi{font-size:1.1rem}.tab.active{color:var(--ink);font-weight:600;border-bottom-color:var(--red)}

  h1{font-size:1.3rem;margin:20px 0 4px}
  .sub{color:var(--muted);font-size:.9rem;margin:0 0 8px;max-width:72ch}

  .pi{padding:18px 0;border-bottom:1px solid var(--line)}
  .pi-head{display:flex;align-items:baseline;justify-content:space-between;gap:12px}
  .pi-name{font-size:1.1rem;font-weight:600;color:var(--red);display:inline-flex;align-items:center;gap:7px}
  .verified{color:var(--slate);font-size:.82rem;display:inline-flex;align-items:center;gap:3px}
  .verified .mi{font-size:1rem}
  .fit{font-size:.86rem;white-space:nowrap}.fit b{font-size:1.05rem}
  .inst{color:var(--muted);font-size:.88rem;margin-top:3px}
  .metrics{color:var(--muted);font-size:.84rem;margin-top:4px;display:flex;flex-wrap:wrap;gap:4px;align-items:center}
  .metrics .mi{font-size:1rem;vertical-align:-.18em}
  .metrics b{color:var(--ink)}.metrics .sep{margin:0 8px;color:#cfd2d6}
  .lab{margin-top:10px}
  .lab-h{font-size:.78rem;font-weight:700;margin-bottom:4px}
  .pub{font-size:.88rem;padding:3px 0}
  .pub .yr{color:var(--muted);font-style:italic;margin-right:8px}
  .pub .m{color:var(--red);font-size:.78rem;margin-left:6px}
  .pactions{margin-top:10px;display:flex;gap:16px}
  .pactions a{display:inline-flex;align-items:center;gap:5px;color:var(--slate);font-size:.84rem;cursor:pointer}
  .pactions a:hover{color:var(--btn)}.pactions .mi{font-size:1.05rem}
</style>
</head>
<body>
<div class="page">
  <div class="top">
    <div class="logo" style="font-size:1.1rem"><span class="sci">SciCo</span><span class="badge">Search</span><span class="sup">[1‑3,✓]</span></div>
    <button class="newbtn" onclick="location.href='search.html'"><span class="mi">add</span> New search</button>
  </div>

  <div class="tabs">
    <div class="tab" id="tabPubs"><span class="mi">description</span> Publications</div>
    <div class="tab" id="tabMap"><span class="mi">hub</span> Topic Map</div>
    <div class="tab active"><span class="mi">science</span> Authors</div>
  </div>

  <h1>Principal Investigators &amp; Labs</h1>
  <p class="sub">Deep-profiles of the PIs behind your top-matched papers — recent lab output and a Fit score for how well their direction overlaps your query.</p>

  <div id="piStatus" class="sub"></div>
  <div id="piList"></div>
</div>

<script src="js/config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabaseClient.js"></script>
<script src="js/api.js"></script>
<script>
  const esc = s => String(s==null?"":s).replace(/[&<>"]/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c]));
  const $ = id => document.getElementById(id);
  const SID = new URLSearchParams(location.search).get('session');
  $('tabPubs').onclick = ()=> location.href='results-publications.html'+(SID?`?session=${SID}`:'');
  $('tabMap').onclick  = ()=> location.href='results-topicmap.html'+(SID?`?session=${SID}`:'');

  const fmt = n => (Number(n)||0).toLocaleString();
  function piHTML(a){
    const recent = (a.recent||[]).map(r=>
      `<div class="pub"><span class="yr">${esc(r.year)}</span>${esc(r.title)}<span class="m">match ${Number(r.match).toFixed(2)}</span></div>`).join('');
    const verified = a.verified ? ' <span class="verified"><span class="mi">verified</span> ORCID</span>' : '';
    const site = a.website ? `<a href="${esc(a.website)}" target="_blank" rel="noopener"><span class="mi">public</span> Website</a>` : '';
    return `<div class="pi">
      <div class="pi-head"><span class="pi-name">${esc(a.name)}${verified}</span><span class="fit">Fit <b>${a.fit}%</b></span></div>
      <div class="inst">${esc(a.institution)}</div>
      <div class="metrics"><span class="mi">article</span> <b>${fmt(a.publications)}</b> publications<span class="sep">|</span><span class="mi">trending_up</span> <b>${fmt(a.citations)}</b> citations<span class="sep">|</span>h-index <b>${a.h_index}</b></div>
      ${recent?`<div class="lab"><div class="lab-h">Recent lab publications</div>${recent}</div>`:''}
      <div class="pactions">${site}<a><span class="mi">mail</span> Contact</a><a><span class="mi">bookmark_add</span> Shortlist</a></div>
    </div>`;
  }
  function render(authors){
    if(!authors || !authors.length){ $('piStatus').textContent='No principal investigators passed the relevance threshold.'; return; }
    $('piStatus').textContent='';
    $('piList').innerHTML = authors.map(piHTML).join('');
  }
  function upgradePrompt(){
    $('piStatus').innerHTML =
      'PI &amp; lab profiling is a premium feature. <a href="pricing.html">See plans &amp; pricing</a> to unlock it.';
  }

  async function start(){
    if(!SID){ $('piStatus').textContent='No session specified.'; return; }
    try{
      let data = await window.SciCoAPI.getSession(SID);
      if(data.authors !== null){ render(data.authors); return; }   // already profiled

      // Need to run profiling — check the plan first for a friendly gate.
      try{
        const me = await window.SciCoAPI.me();
        if((me.quotas.pi_profiling||{}).limit === 0){ upgradePrompt(); return; }
      }catch(_){ /* fall through; backend still enforces */ }

      $('piStatus').textContent='Deep-profiling principal investigators…';
      const { job_id } = await window.SciCoAPI.profileAuthors(SID);
      await window.SciCoAPI.streamJob(job_id, { onEvent(t,d){ if(t==='query_stat') $('piStatus').textContent=d.message; } });
      data = await window.SciCoAPI.getSession(SID);
      render(data.authors);
    }catch(err){
      if(err.code===402){ upgradePrompt(); }
      else if(err.code===401){ location.href='index.html'; }
      else { $('piStatus').textContent='Could not load profiles ('+(err.message||'error')+').'; }
    }
  }
  start();
</script>
</body>
</html>
